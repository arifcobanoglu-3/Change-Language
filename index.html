<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Postacı — Dil Pratiği</title>
<meta name="description" content="İngilizce ve Türkçe arasında rastgele cümlelerle çeviri pratiği yapın." />
<meta name="theme-color" content="#14213D" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Postacı" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink-navy:#14213D;
    --ink-navy-2:#1B2C50;
    --paper:#FBF6EA;
    --paper-line:#E4DBC3;
    --airmail-red:#C23B33;
    --airmail-blue:#2E5C8A;
    --stamp-gold:#C99A3D;
    --ink:#232A36;
    --muted:#7A7362;
    --ok:#3E7A4D;
    --warn:#B98A1F;
    --bad:#B3392F;
    --radius-lg:22px;
    --radius-md:14px;
    --shadow-card:0 18px 40px -18px rgba(20,33,61,0.55);
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(1200px 800px at 15% -10%, rgba(46,92,138,0.35), transparent 60%),
      radial-gradient(900px 700px at 110% 10%, rgba(194,59,51,0.18), transparent 55%),
      var(--ink-navy);
    color:var(--paper);
    font-family:'IBM Plex Sans', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
    overflow-x:hidden;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }

  button{ font-family:inherit; cursor:pointer; }
  button:focus-visible, textarea:focus-visible, input:focus-visible, select:focus-visible{
    outline:3px solid var(--stamp-gold);
    outline-offset:2px;
  }

  .app{
    max-width:520px;
    margin:0 auto;
    padding:18px 16px 100px;
    min-height:100vh;
    position:relative;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:18px;
  }

  .postmark{
    position:relative;
    width:84px;
    height:84px;
    flex:0 0 auto;
    border-radius:50%;
    background:transparent;
    border:2px dashed rgba(251,246,234,0.55);
    color:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    transform:rotate(-6deg);
    transition:transform .35s ease;
  }
  .postmark:hover{ transform:rotate(-2deg) scale(1.03); }
  .postmark.spin{ transform:rotate(354deg); }
  .postmark::before{
    content:"";
    position:absolute;
    inset:6px;
    border-radius:50%;
    border:1px solid rgba(251,246,234,0.35);
  }
  .pm-text{
    font-family:'Special Elite', monospace;
    font-size:13px;
    line-height:1.35;
    text-align:center;
    letter-spacing:0.5px;
  }
  .pm-text .pm-arrow{ display:block; font-size:11px; opacity:0.8; }

  .levels{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:4px 2px;
    scrollbar-width:none;
  }
  .levels::-webkit-scrollbar{ display:none; }

  .stamp-btn{
    flex:0 0 auto;
    min-width:44px;
    padding:8px 10px;
    background:rgba(251,246,234,0.06);
    border:2px dashed rgba(251,246,234,0.4);
    border-radius:8px;
    color:var(--paper);
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:13px;
    letter-spacing:0.5px;
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .stamp-btn.active{
    background:var(--stamp-gold);
    border-color:var(--stamp-gold);
    color:var(--ink-navy);
    transform:rotate(-3deg) scale(1.05);
  }

  /* ---------- Postcard ---------- */
  .mail-wrap{ margin-top:6px; }

  .airmail-border{
    border-radius:var(--radius-lg);
    padding:9px;
    background:repeating-linear-gradient(
      135deg,
      var(--airmail-red) 0 16px,
      var(--paper) 16px 22px,
      var(--airmail-blue) 22px 38px,
      var(--paper) 38px 44px
    );
    box-shadow:var(--shadow-card);
  }

  .card-inner{
    background:var(--paper);
    border-radius:calc(var(--radius-lg) - 8px);
    padding:22px 20px 20px;
    color:var(--ink);
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    text-transform:uppercase;
    font-size:11px;
    letter-spacing:1.5px;
    color:var(--muted);
    margin:0 0 10px;
  }

  .sentence{
    font-family:'Special Elite', monospace;
    font-size:22px;
    line-height:1.5;
    margin:0 0 20px;
    min-height:66px;
    color:var(--ink);
  }

  .lines-label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--muted);
    margin-bottom:6px;
  }

  .answer-row{
    display:flex;
    align-items:flex-end;
    gap:10px;
    background:
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 33px,
        var(--paper-line) 34px
      );
    border-bottom:2px solid var(--paper-line);
    padding-top:2px;
  }

  .lines-input{
    flex:1 1 auto;
    resize:none;
    border:none;
    background:transparent;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:17px;
    line-height:34px;
    color:var(--ink);
    padding:0;
  }
  .lines-input::placeholder{ color:#B7AF98; }

  .mic-btn{
    flex:0 0 auto;
    width:46px;
    height:46px;
    border-radius:50%;
    border:2px solid var(--airmail-blue);
    background:var(--paper);
    color:var(--airmail-blue);
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:6px;
    transition:transform .15s ease, background .15s ease, color .15s ease;
  }
  .mic-btn.listening{
    background:var(--airmail-red);
    border-color:var(--airmail-red);
    color:var(--paper);
    animation:pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
  }

  .mic-status{
    min-height:18px;
    font-size:12.5px;
    color:var(--airmail-blue);
    margin:6px 0 0;
  }

  .actions{
    display:flex;
    gap:10px;
    margin-top:18px;
  }

  .btn{
    flex:1 1 0;
    padding:13px 12px;
    border-radius:10px;
    font-weight:600;
    font-size:14.5px;
    letter-spacing:0.2px;
    border:2px solid transparent;
    transition:transform .12s ease, filter .12s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-ghost{
    background:transparent;
    border-color:var(--airmail-red);
    color:var(--airmail-red);
  }
  .btn-ghost:hover{ background:rgba(194,59,51,0.08); }
  .btn-solid{
    background:var(--ink-navy);
    color:var(--paper);
  }
  .btn-solid:hover{ filter:brightness(1.12); }
  .btn:disabled{ opacity:0.6; transform:none; cursor:default; }

  .feedback{
    margin-top:20px;
    padding-top:16px;
    border-top:1px dashed var(--paper-line);
  }
  .stamp-result{
    display:inline-block;
    font-family:'Special Elite', monospace;
    font-size:15px;
    letter-spacing:1.5px;
    padding:5px 12px;
    border:3px solid var(--bad);
    color:var(--bad);
    border-radius:6px;
    transform:rotate(-4deg);
    margin-bottom:10px;
  }
  .stamp-result.dogru{ border-color:var(--ok); color:var(--ok); }
  .stamp-result.kismen_dogru{ border-color:var(--warn); color:var(--warn); }

  #feedbackText{ margin:0 0 6px; line-height:1.5; font-size:14.5px; }
  #correctAnswer{ margin:0; font-size:14px; color:var(--muted); font-style:italic; }

  /* ---------- Settings tab & panel ---------- */
  .settings-tab{
    position:fixed;
    right:16px;
    bottom:16px;
    width:52px;
    height:52px;
    border-radius:14px 4px 14px 4px;
    background:var(--stamp-gold);
    color:var(--ink-navy);
    border:none;
    font-size:20px;
    box-shadow:0 10px 24px -8px rgba(0,0,0,0.5);
    z-index:20;
    transition:transform .15s ease;
  }
  .settings-tab:hover{ transform:translateY(-2px); }

  .settings-panel{
    position:fixed;
    right:12px;
    bottom:78px;
    width:min(340px, calc(100vw - 24px));
    max-height:min(78vh, 560px);
    overflow-y:auto;
    background:var(--paper);
    color:var(--ink);
    border-radius:16px;
    padding:18px 18px 16px;
    box-shadow:0 24px 60px -20px rgba(0,0,0,0.6);
    z-index:21;
    border:2px solid var(--ink-navy);
  }
  .settings-panel h2{
    font-family:'Special Elite', monospace;
    font-size:17px;
    margin:0 0 14px;
  }
  .settings-panel label{
    display:block;
    font-size:12.5px;
    font-weight:600;
    color:var(--muted);
    margin:0 0 14px;
  }
  .settings-panel select,
  .settings-panel input[type="text"],
  .settings-panel input[type="password"]{
    display:block;
    width:100%;
    margin-top:6px;
    padding:10px 11px;
    border-radius:8px;
    border:1.5px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
    font-size:14.5px;
    font-family:'IBM Plex Sans', sans-serif;
  }
  .key-row{ display:flex; gap:8px; margin-top:6px; }
  .key-row input{ margin-top:0; flex:1 1 auto; }
  .key-row button{
    flex:0 0 auto;
    width:42px;
    border-radius:8px;
    border:1.5px solid var(--paper-line);
    background:#fff;
    font-size:16px;
  }
  .hint{
    font-size:12px;
    color:var(--muted);
    line-height:1.5;
    margin:0 0 14px;
  }

  [hidden]{ display:none !important; }

  @media (max-width:360px){
    .sentence{ font-size:19px; }
    .postmark{ width:74px; height:74px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <button id="directionBtn" class="postmark" type="button" aria-label="Çeviri yönünü değiştir">
      <span class="pm-text">
        <span id="langFrom">EN</span>
        <span class="pm-arrow">⇄</span>
        <span id="langTo">TR</span>
      </span>
    </button>

    <div class="levels" id="levelsWrap" role="group" aria-label="İngilizce seviyesi seç"></div>
  </header>

  <main class="mail-wrap">
    <div class="airmail-border">
      <section class="card-inner" id="postcard">
        <p class="eyebrow" id="sourceLabel">Kaynak cümle · İngilizce</p>
        <p id="sourceSentence" class="sentence">Cümle hazırlanıyor…</p>

        <label class="lines-label" for="answerInput" id="answerLabel">Çeviriniz · Türkçe</label>
        <div class="answer-row">
          <textarea id="answerInput" class="lines-input" rows="2" placeholder="Çevirinizi buraya yazın…"></textarea>
          <button id="micBtn" class="mic-btn" type="button" aria-label="Mikrofonla söyle" title="Mikrofonla söyle">🎤</button>
        </div>
        <p id="micStatus" class="mic-status" aria-live="polite"></p>

        <div class="actions">
          <button id="skipBtn" class="btn btn-ghost" type="button">Bu cümleyi atla</button>
          <button id="checkBtn" class="btn btn-solid" type="button">Kontrol et</button>
        </div>

        <div id="feedback" class="feedback" hidden>
          <span id="stampResult" class="stamp-result">SONUÇ</span>
          <p id="feedbackText"></p>
          <p id="correctAnswer"></p>
        </div>
      </section>
    </div>
  </main>

</div>

<button id="settingsToggle" class="settings-tab" type="button" aria-label="Ayarları aç/kapat">⚙</button>

<aside id="settingsPanel" class="settings-panel" hidden>
  <h2>Ayarlar</h2>

  <label>Yapay zekâ sağlayıcı
    <select id="providerSelect">
      <option value="anthropic">Anthropic (Claude)</option>
      <option value="openai">OpenAI</option>
      <option value="gemini">Google (Gemini)</option>
    </select>
  </label>

  <label>Model adı
    <input type="text" id="modelInput" placeholder="ör. claude-sonnet-5" />
  </label>

  <label>API anahtarı
    <div class="key-row">
      <input type="password" id="apiKeyInput" placeholder="API anahtarınızı yapıştırın" autocomplete="off" />
      <button id="toggleKeyVisibility" type="button" aria-label="Anahtarı göster/gizle">👁</button>
    </div>
  </label>

  <p class="hint">Anahtarınız yalnızca bu telefonda/tarayıcıda saklanır ve doğrudan seçtiğiniz sağlayıcıya gönderilir; başka hiçbir sunucudan geçmez.</p>

  <button id="closeSettings" class="btn btn-ghost" type="button" style="width:100%;">Kapat</button>
</aside>

<script>
(function(){
  "use strict";

  const $ = (id) => document.getElementById(id);

  const LEVELS = ["A1","A2","B1","B2","C1","C2"];
  const DEFAULT_MODELS = {
    anthropic: "claude-sonnet-5",
    openai: "gpt-4o-mini",
    gemini: "gemini-2.0-flash"
  };

  const state = {
    direction: localStorage.getItem("postaci:direction") || "en-tr",
    level: localStorage.getItem("postaci:level") || "B1",
    provider: localStorage.getItem("postaci:provider") || "anthropic",
    model: localStorage.getItem("postaci:model") || "",
    apiKey: localStorage.getItem("postaci:apiKey") || "",
    currentSentence: "",
    history: []
  };

  function save(key, value){
    localStorage.setItem("postaci:" + key, value);
    state[key] = value;
  }

  function sourceLangName(){ return state.direction === "en-tr" ? "İngilizce" : "Türkçe"; }
  function targetLangName(){ return state.direction === "en-tr" ? "Türkçe" : "İngilizce"; }

  // ---------- Direction & level UI ----------
  function renderDirection(){
    const fromTo = state.direction === "en-tr" ? ["EN","TR"] : ["TR","EN"];
    $("langFrom").textContent = fromTo[0];
    $("langTo").textContent = fromTo[1];
    $("sourceLabel").textContent = "Kaynak cümle · " + sourceLangName();
    $("answerLabel").textContent = "Çeviriniz · " + targetLangName();
  }

  function buildLevelButtons(){
    const wrap = $("levelsWrap");
    wrap.innerHTML = "";
    LEVELS.forEach((lv) => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "stamp-btn" + (lv === state.level ? " active" : "");
      b.textContent = lv;
      b.addEventListener("click", () => {
        wrap.querySelectorAll(".stamp-btn").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        save("level", lv);
        loadNewSentence();
      });
      wrap.appendChild(b);
    });
  }

  $("directionBtn").addEventListener("click", () => {
    save("direction", state.direction === "en-tr" ? "tr-en" : "en-tr");
    renderDirection();
    const btn = $("directionBtn");
    btn.classList.add("spin");
    setTimeout(() => btn.classList.remove("spin"), 380);
    loadNewSentence();
  });

  // ---------- Settings panel ----------
  function initSettingsUI(){
    $("providerSelect").value = state.provider;
    $("modelInput").value = state.model || DEFAULT_MODELS[state.provider] || "";
    $("apiKeyInput").value = state.apiKey;

    $("settingsToggle").addEventListener("click", () => {
      $("settingsPanel").hidden = !$("settingsPanel").hidden;
    });
    $("closeSettings").addEventListener("click", () => { $("settingsPanel").hidden = true; });

    $("providerSelect").addEventListener("change", (e) => {
      save("provider", e.target.value);
      if(!state.model){ $("modelInput").value = DEFAULT_MODELS[e.target.value] || ""; }
    });
    $("modelInput").addEventListener("input", (e) => save("model", e.target.value.trim()));
    $("apiKeyInput").addEventListener("input", (e) => save("apiKey", e.target.value.trim()));

    $("toggleKeyVisibility").addEventListener("click", () => {
      const input = $("apiKeyInput");
      input.type = input.type === "password" ? "text" : "password";
    });
  }

  // ---------- LLM provider calls ----------
  async function callLLM(systemPrompt, userPrompt){
    const provider = state.provider;
    const apiKey = (state.apiKey || "").trim();
    const model = (state.model || DEFAULT_MODELS[provider] || "").trim();

    if(!apiKey){
      throw new Error("Sağ alttaki ayarlar bölümünden bir API anahtarı girin.");
    }

    if(provider === "anthropic"){
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model,
          max_tokens: 500,
          system: systemPrompt,
          messages: [{ role: "user", content: userPrompt }]
        })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message || "Anthropic API hatası");
      return (data.content || []).map((b) => b.text || "").join("").trim();
    }

    if(provider === "openai"){
      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "Authorization": "Bearer " + apiKey
        },
        body: JSON.stringify({
          model,
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: userPrompt }
          ],
          temperature: 0.9
        })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message || "OpenAI API hatası");
      return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content || "").trim();
    }

    if(provider === "gemini"){
      const url = "https://generativelanguage.googleapis.com/v1beta/models/" +
        encodeURIComponent(model) + ":generateContent?key=" + encodeURIComponent(apiKey);
      const res = await fetch(url, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: systemPrompt }] },
          contents: [{ role: "user", parts: [{ text: userPrompt }] }],
          generationConfig: { temperature: 0.9 }
        })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message || "Gemini API hatası");
      const parts = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts || [];
      return parts.map((p) => p.text || "").join("").trim();
    }

    throw new Error("Bilinmeyen sağlayıcı.");
  }

  // ---------- Sentence generation ----------
  function pushHistory(sentence){
    if(!sentence) return;
    state.history.push(sentence);
    if(state.history.length > 5) state.history.shift();
  }

  async function loadNewSentence(){
    const sentenceEl = $("sourceSentence");
    sentenceEl.textContent = "Cümle hazırlanıyor…";
    $("feedback").hidden = true;
    $("answerInput").value = "";
    $("micStatus").textContent = "";

    try{
      const sys = "Sen deneyimli bir dil öğretmenisin. Sadece istenen tek cümleyi üret; tırnak işareti, açıklama ya da ek metin ekleme.";
      const avoid = state.history.length
        ? ("Şu cümleleri tekrar üretme: " + state.history.join(" | ") + ".")
        : "";
      const prompt =
        sourceLangName() + " dilinde, İngilizce CEFR seviyesi " + state.level +
        " karmaşıklığına uygun, günlük hayattan rastgele TEK bir cümle üret. " +
        "Her seferinde farklı bir konu ve cümle yapısı seç. " + avoid +
        " Sadece cümlenin kendisini yaz, başka hiçbir şey ekleme.";

      const raw = await callLLM(sys, prompt);
      const cleaned = (raw || "").trim().replace(/^["“”'']+|["“”'']+$/g, "");
      state.currentSentence = cleaned;
      sentenceEl.textContent = cleaned || "Cümle alınamadı, lütfen tekrar deneyin.";
    }catch(err){
      sentenceEl.textContent = "Hata: " + err.message;
    }
  }

  // ---------- Check translation ----------
  function renderFeedback(p){
    const fb = $("feedback");
    fb.hidden = false;
    const stamp = $("stampResult");
    const verdict = p.verdict === "dogru" ? "dogru" : p.verdict === "kismen_dogru" ? "kismen_dogru" : "yanlis";
    stamp.className = "stamp-result " + verdict;
    stamp.textContent = verdict === "dogru" ? "DOĞRU" : verdict === "kismen_dogru" ? "KISMEN DOĞRU" : "YANLIŞ";
    $("feedbackText").textContent = p.feedback || "";
    $("correctAnswer").textContent = p.correct_translation ? ("Önerilen çeviri: " + p.correct_translation) : "";
  }

  async function checkTranslation(){
    const answer = $("answerInput").value.trim();
    if(!answer){
      $("micStatus").textContent = "Lütfen önce bir çeviri yazın ya da söyleyin.";
      return;
    }
    const btn = $("checkBtn");
    btn.disabled = true;
    const originalLabel = btn.textContent;
    btn.textContent = "Kontrol ediliyor…";

    try{
      const sys =
        "Sen deneyimli bir dil öğretmenisin. Yanıtını SADECE geçerli JSON olarak ver; " +
        "markdown, kod bloğu ya da ek açıklama ekleme. Şema: " +
        '{"verdict":"dogru|kismen_dogru|yanlis","feedback":"Türkçe kısa geri bildirim (1-2 cümle)","correct_translation":"örnek doğru çeviri"}';
      const prompt =
        "Kaynak cümle (" + sourceLangName() + '): "' + state.currentSentence + '"\n' +
        "Öğrencinin çevirisi (" + targetLangName() + '): "' + answer + '"\n' +
        "Öğrencinin hedef seviyesi: " + state.level + ".\n" +
        "Çeviriyi anlam ve doğallık açısından değerlendir; küçük farklı ifade biçimlerini kabul et. Sadece JSON döndür.";

      const raw = await callLLM(sys, prompt);
      const match = raw.match(/\{[\s\S]*\}/);
      const parsed = JSON.parse(match ? match[0] : raw);
      renderFeedback(parsed);
      pushHistory(state.currentSentence);
    }catch(err){
      renderFeedback({ verdict: "yanlis", feedback: "Değerlendirme alınamadı: " + err.message, correct_translation: "" });
    }finally{
      btn.disabled = false;
      btn.textContent = originalLabel;
    }
  }

  $("checkBtn").addEventListener("click", checkTranslation);
  $("skipBtn").addEventListener("click", () => {
    pushHistory(state.currentSentence);
    loadNewSentence();
  });

  // ---------- Microphone (speech-to-text) ----------
  // Permission is requested only inside this click handler (a real user
  // gesture), never on page load, and only when the browser supports it.
  const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;

  if(!SpeechRecognitionCtor){
    $("micBtn").hidden = true;
  }else{
    $("micBtn").addEventListener("click", () => {
      if(recognition){
        recognition.stop();
        return;
      }
      try{
        recognition = new SpeechRecognitionCtor();
        recognition.lang = state.direction === "en-tr" ? "tr-TR" : "en-US"; // hedef dil = konuşulan dil
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
          $("micBtn").classList.add("listening");
          $("micStatus").textContent = "Dinleniyor…";
        };
        recognition.onresult = (e) => {
          const text = e.results[0][0].transcript;
          const current = $("answerInput").value.trim();
          $("answerInput").value = current ? (current + " " + text) : text;
          $("micStatus").textContent = "";
        };
        recognition.onerror = (e) => {
          if(e.error === "not-allowed" || e.error === "service-not-allowed"){
            $("micStatus").textContent = "Mikrofon izni verilmedi. Tarayıcı site ayarlarından mikrofona izin verip tekrar deneyin.";
          }else if(e.error === "no-speech"){
            $("micStatus").textContent = "Ses algılanamadı, tekrar deneyin.";
          }else{
            $("micStatus").textContent = "Mikrofon hatası: " + e.error;
          }
        };
        recognition.onend = () => {
          $("micBtn").classList.remove("listening");
          recognition = null;
        };
        recognition.start();
      }catch(err){
        $("micStatus").textContent = "Mikrofon başlatılamadı: " + err.message;
        recognition = null;
      }
    });
  }

  // ---------- Boot ----------
  renderDirection();
  buildLevelButtons();
  initSettingsUI();
  loadNewSentence();

  if("serviceWorker" in navigator){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
})();
</script>
</body>
</html>
